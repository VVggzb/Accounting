<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>注册 - 我的账本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #F7F7F7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background-color: #FFFFFF;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 340px;
            padding: 40px 28px 48px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background-color: #FFD250;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            box-shadow: 0 4px 8px rgba(255, 210, 80, 0.2);
        }
        .logo-icon span {
            font-size: 32px;
        }
        .logo-area h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1F1F1F;
        }
        .logo-area p {
            font-size: 13px;
            color: #8E8E93;
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 18px;
        }
        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #3A3A3C;
            margin-bottom: 8px;
        }
        .input-field {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1.5px solid #E5E5EA;
            font-size: 16px;
            color: #1F1F1F;
            background: transparent;
            transition: border-color 0.2s;
            outline: none;
        }
        .input-field:focus {
            border-bottom-color: #FFD250;
        }

        .register-btn {
            width: 100%;
            background-color: #FFD250;
            border: none;
            border-radius: 44px;
            padding: 14px 0;
            font-size: 17px;
            font-weight: 600;
            color: #1F1F1F;
            margin-top: 28px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(255, 210, 80, 0.3);
        }
        .register-btn:active {
            transform: scale(0.97);
            background-color: #e8bd40;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: #8E8E93;
        }
        .login-link a {
            color: #FFD250;
            text-decoration: none;
            font-weight: 600;
        }

        .success-msg {
            background-color: #E8F5E9;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            color: #2E7D32;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg {
            background-color: #FFF3F0;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            color: #FF3B30;
            margin-bottom: 20px;
            display: none;
        }

        .footer-placeholder {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #C6C6C8;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo-area">
            <div class="logo-icon">
                <span>✨</span>
            </div>
            <h1>加入我们</h1>
            <p>开启你的记账与收藏之旅</p>
        </div>

        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="input-group">
            <div class="input-label">用户名</div>
            <input type="text" class="input-field" id="username" placeholder="请输入用户名" autocomplete="off">
        </div>

        <div class="input-group">
            <div class="input-label">密码</div>
            <input type="password" class="input-field" id="password" placeholder="请设置密码">
        </div>

        <div class="input-group">
            <div class="input-label">确认密码</div>
            <input type="password" class="input-field" id="confirmPassword" placeholder="请再次输入密码">
        </div>

        <button class="register-btn" id="registerBtn">注 册</button>

        <div class="login-link">
            已有账号？<a href="login.html">去登录</a>
        </div>
        <div class="footer-placeholder">
            轻快记账 · 收藏热爱
        </div>
    </div>

    <script>
        const BASE_URL = 'http://tool.gvzbz.fun/api';

        function showSuccess(msg) {
            document.getElementById('successMsg').textContent = msg;
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleRegister() {
            hideMessages();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username || !password || !confirmPassword) {
                showError('请填写完整信息');
                return;
            }
            if (username.length < 2) {
                showError('用户名至少2个字符');
                return;
            }
            if (password.length < 4) {
                showError('密码至少4个字符');
                return;
            }
            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess('注册成功！正在跳转登录页...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    showError(result.message || '注册失败');
                }
            } catch (error) {
                showError('网络异常，请检查后端服务');
            }
        }

        document.getElementById('registerBtn').addEventListener('click', handleRegister);
        
        ['username', 'password', 'confirmPassword'].forEach(id => {
            document.getElementById(id).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRegister();
            });
        });

        if (localStorage.getItem('token')) {
            window.location.href = 'bill.html';
        }
    </script>
</body>
</html>
