<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登录 - 我的账本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #F7F7F7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background-color: #FFFFFF;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 340px;
            padding: 40px 28px 48px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background-color: #FFD250;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 8px rgba(255, 210, 80, 0.2);
        }
        .logo-icon span {
            font-size: 36px;
        }
        .logo-area h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1F1F1F;
        }
        .logo-area p {
            font-size: 13px;
            color: #8E8E93;
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #3A3A3C;
            margin-bottom: 8px;
        }
        .input-field {
            width: 100%;
            padding: 14px 0;
            border: none;
            border-bottom: 1.5px solid #E5E5EA;
            font-size: 16px;
            color: #1F1F1F;
            background: transparent;
            transition: border-color 0.2s;
            outline: none;
        }
        .input-field:focus {
            border-bottom-color: #FFD250;
        }

        .login-btn {
            width: 100%;
            background-color: #FFD250;
            border: none;
            border-radius: 44px;
            padding: 14px 0;
            font-size: 17px;
            font-weight: 600;
            color: #1F1F1F;
            margin-top: 28px;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(255, 210, 80, 0.3);
        }
        .login-btn:active {
            transform: scale(0.97);
            background-color: #e8bd40;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: #8E8E93;
        }
        .register-link a {
            color: #FFD250;
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg {
            background-color: #FFF3F0;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            color: #FF3B30;
            margin-bottom: 20px;
            display: none;
        }

        .footer-placeholder {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #C6C6C8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon">
                <span>📒</span>
            </div>
            <h1>我的账本</h1>
            <p>记录每一笔，收藏每一刻</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="input-group">
            <div class="input-label">用户名</div>
            <input type="text" class="input-field" id="username" placeholder="请输入用户名" autocomplete="off">
        </div>

        <div class="input-group">
            <div class="input-label">密码</div>
            <input type="password" class="input-field" id="password" placeholder="请输入密码">
        </div>

        <button class="login-btn" id="loginBtn">登 录</button>

        <div class="register-link">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
        <div class="footer-placeholder">
            轻快记账 · 收藏热爱
        </div>
    </div>

    <script>
        const BASE_URL = 'https://tool.gvzbz.fun/api';

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 2500);
        }

        function saveAuthData(token, userId, username) {
            localStorage.setItem('token', token);
            localStorage.setItem('userId', userId);
            localStorage.setItem('username', username);
            console.log('✅ token 已保存:', token.substring(0, 50) + '...');
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('请填写用户名和密码');
                return;
            }

            console.log('开始登录:', username);

            try {
                const response = await fetch(`${BASE_URL}/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                console.log('登录响应:', result);

                if (result.success && result.data && result.data.token) {
                    saveAuthData(result.data.token, result.data.user_id, result.data.username);
                    console.log('登录成功，跳转到 bill.html');
                    window.location.href = 'bill.html';
                } else {
                    showError(result.message || '登录失败');
                }
            } catch (error) {
                console.error('登录错误:', error);
                showError('网络异常，请检查后端服务');
            }
        }

        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // 如果已登录，直接跳转
        const existingToken = localStorage.getItem('token');
        if (existingToken) {
            console.log('已有 token，直接跳转');
            window.location.href = 'bill.html';
        }
    </script>
</body>
</html>
