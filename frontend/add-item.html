<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>新增藏品 - 我的账本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F7F7F7;
            min-height: 100vh;
        }
        .nav-bar {
            background-color: #FFD250;
            padding: 60px 20px 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-back {
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .nav-title {
            font-size: 20px;
            font-weight: 600;
            color: #1F1F1F;
        }
        .nav-placeholder { width: 36px; }
        .upload-section {
            background-color: #FFFFFF;
            margin: 20px 16px;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }
        .upload-label {
            font-size: 14px;
            color: #8E8E93;
            margin-bottom: 12px;
        }
        .upload-area {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            background-color: #F2F2F7;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .upload-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-placeholder {
            font-size: 32px;
            color: #C6C6C8;
            text-align: center;
        }
        .upload-placeholder span {
            font-size: 12px;
            display: block;
            margin-top: 8px;
        }
        .file-input { display: none; }
        .delete-img-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background-color: rgba(0,0,0,0.5);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }
        .form-card {
            background-color: #FFFFFF;
            border-radius: 24px;
            margin: 0 16px 16px 16px;
            padding: 20px;
        }
        .input-group { margin-bottom: 20px; }
        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #3A3A3C;
            margin-bottom: 8px;
        }
        .input-field {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1.5px solid #E5E5EA;
            font-size: 16px;
            color: #1F1F1F;
            background: transparent;
            outline: none;
        }
        .input-field:focus { border-bottom-color: #FFD250; }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 32px 16px 20px 16px;
        }
        .btn {
            flex: 1;
            padding: 14px 0;
            border-radius: 44px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }
        .btn-primary {
            background-color: #FFD250;
            color: #1F1F1F;
        }
        .btn-secondary {
            background-color: #F2F2F7;
            color: #8E8E93;
        }
        .error-msg {
            background-color: #FFF3F0;
            border-radius: 12px;
            padding: 10px 16px;
            margin: 0 16px 12px 16px;
            font-size: 13px;
            color: #FF3B30;
            display: none;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-back" id="backBtn">←</div>
        <div class="nav-title" id="pageTitle">新增藏品</div>
        <div class="nav-placeholder"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="upload-section">
        <div class="upload-label">藏品图片</div>
        <div class="upload-area" id="uploadArea">
            <img id="previewImg" class="upload-preview" style="display: none;">
            <div id="uploadPlaceholder" class="upload-placeholder">
                📷<span>点击上传</span>
            </div>
            <div id="deleteImgBtn" class="delete-img-btn" style="display: none;">×</div>
        </div>
        <input type="file" id="fileInput" class="file-input" accept="image/jpeg,image/png,image/jpg">
    </div>

    <div class="form-card">
        <div class="input-group">
            <div class="input-label">藏品名称 <span style="color: #FF3B30;">*</span></div>
            <input type="text" class="input-field" id="itemName" placeholder="例如：星黛露公仔">
        </div>
        <div class="input-group">
            <div class="input-label">购入金额 <span style="color: #FF3B30;">*</span></div>
            <input type="number" class="input-field" id="itemAmount" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
            <div class="input-label">购买时间</div>
            <input type="date" class="input-field" id="purchaseDate">
        </div>
    </div>

    <div class="action-buttons">
        <div class="btn btn-secondary" id="cancelBtn">取消</div>
        <div class="btn btn-primary" id="saveBtn">保存</div>
    </div>

    <script>
        const BASE_URL = 'http://127.0.0.1:5000/api';
        function getToken() { return localStorage.getItem('token'); }
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 2500);
        }

        let collectionId = null, itemId = null, currentImageUrl = null;

        async function uploadImage(file) {
            const token = getToken();
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`${BASE_URL}/upload/image`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const result = await response.json();
                return result.success ? result.data.image_url : null;
            } catch (error) {
                showError('图片上传失败');
                return null;
            }
        }

        function initImageUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const previewImg = document.getElementById('previewImg');
            const uploadPlaceholder = document.getElementById('uploadPlaceholder');
            const deleteImgBtn = document.getElementById('deleteImgBtn');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    uploadPlaceholder.style.display = 'none';
                    deleteImgBtn.style.display = 'flex';
                };
                reader.readAsDataURL(file);
                const imageUrl = await uploadImage(file);
                if (imageUrl) currentImageUrl = imageUrl;
            });
            deleteImgBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                previewImg.style.display = 'none';
                uploadPlaceholder.style.display = 'flex';
                deleteImgBtn.style.display = 'none';
                currentImageUrl = null;
                fileInput.value = '';
            });
        }

        async function handleSave() {
            const name = document.getElementById('itemName').value.trim();
            const amount = parseFloat(document.getElementById('itemAmount').value);
            if (!name) { showError('请输入藏品名称'); return; }
            if (isNaN(amount) || amount <= 0) { showError('请输入有效金额'); return; }
            
            const purchaseDate = document.getElementById('purchaseDate').value;
            const data = { name, amount, purchase_date: purchaseDate || null, image_url: currentImageUrl || null };
            const token = getToken();
            
            try {
                let result;
                if (itemId) {
                    const response = await fetch(`${BASE_URL}/collections/items/${itemId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify(data)
                    });
                    result = await response.json();
                } else {
                    const response = await fetch(`${BASE_URL}/collections/${collectionId}/items`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify(data)
                    });
                    result = await response.json();
                }
                if (result.success) {
                    window.location.href = `collection-detail.html?id=${collectionId}`;
                } else {
                    showError(result.message || '保存失败');
                }
            } catch (error) { showError('网络异常'); }
        }

        async function loadItemDetail() {
            const token = getToken();
            try {
                const response = await fetch(`${BASE_URL}/collections/${collectionId}/items`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (result.success) {
                    const item = result.data.items.find(i => i.id == itemId);
                    if (item) {
                        document.getElementById('itemName').value = item.name;
                        document.getElementById('itemAmount').value = item.amount;
                        if (item.purchase_date) document.getElementById('purchaseDate').value = item.purchase_date;
                        if (item.image_url && item.image_url !== '/static/default.jpg') {
                            currentImageUrl = item.image_url;
                            document.getElementById('previewImg').src = item.image_url;
                            document.getElementById('previewImg').style.display = 'block';
                            document.getElementById('uploadPlaceholder').style.display = 'none';
                            document.getElementById('deleteImgBtn').style.display = 'flex';
                        }
                    }
                }
            } catch (error) { console.error(error); }
        }

        function init() {
            collectionId = getUrlParam('collectionId');
            itemId = getUrlParam('itemId');
            if (!collectionId) { window.location.href = 'asset.html'; return; }
            if (itemId) {
                document.getElementById('pageTitle').innerText = '编辑藏品';
                loadItemDetail();
            } else {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('purchaseDate').value = today;
            }
            initImageUpload();
            document.getElementById('backBtn').onclick = () => window.location.href = `collection-detail.html?id=${collectionId}`;
            document.getElementById('cancelBtn').onclick = () => window.location.href = `collection-detail.html?id=${collectionId}`;
            document.getElementById('saveBtn').onclick = handleSave;
        }
        init();
    </script>
</body>
</html>
